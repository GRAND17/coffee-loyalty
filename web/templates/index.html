<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>☕ Coffee Loyalty</title>
</head>
<body>
    <h1>☕ Coffee Loyalty</h1>
    
    <!-- Форма регистрации -->
    <h2>📋 Регистрация нового гостя</h2>
    <form action="/register" method="POST">
        <input type="text" name="name" placeholder="Имя" required>
        <input type="tel" name="phone" placeholder="Телефон" required>
        <button type="submit">✅ Зарегистрировать</button>
    </form>
    
    <hr>
    
    <!-- Действия -->
    <h2>☕ Действия</h2>
    <form action="/check" method="POST">
        <input type="tel" name="phone" placeholder="Телефон" required>
        <button type="submit">☕ Отметить визит</button>
    </form>
    
    <br>
    
    <form action="/info" method="POST">
        <input type="tel" name="phone" placeholder="Телефон" required>
        <button type="submit">📊 Информация</button>
    </form>

    <hr>
    
    <!-- Таблица клиентов -->
    <h2>👥 Все гости</h2>
    {% if customers %}
    <table border="1">
        <tr>
            <th>Имя</th>
            <th>Телефон</th>
            <th>Визитов</th>
            <th>Скидка</th>
        </tr>
        {% for c in customers %}
        <tr>
            <td>{{ c[0] }}</td>
            <td>{{ c[1] }}</td>
            <td>{{ c[2] }}</td>
            <td>{{ c[3] }}%</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>Пока нет зарегистрированных гостей</p>
    {% endif %}
</body>
</html>
